<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <h1>Music Player System</h1>
    </header>

    <main class="player-container">
        <div class="music-card">
            <div class="track-art-container">
                <img id="track-art" src="https://via.placeholder.com/250" alt="Album Art">
            </div>
            
            <div class="track-details">
                <h2 id="track-title">Song Title</h2>
                <h3 id="track-artist">Artist Name</h3>
            </div>

            <div class="progress-container">
                <span id="current-time">0:00</span>
                <input type="range" id="progress-bar" min="0" max="100" value="0">
                <span id="total-duration">0:00</span>
            </div>

            <div class="controls">
                <button id="prev-btn" class="control-btn" title="Previous"><i class="fas fa-backward"></i></button>
                <button id="play-btn" class="control-btn main-btn" title="Play"><i class="fas fa-play"></i></button>
                <button id="next-btn" class="control-btn" title="Next"><i class="fas fa-forward"></i></button>
            </div>

            <div class="volume-container">
                <i class="fas fa-volume-down" id="volume-icon"></i>
                <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.7">
            </div>
        </div>

        <div class="playlist-card">
            <h3><i class="fas fa-list-ul"></i> Up Next</h3>
            <ul id="playlist-queue">
                </ul>
        </div>
    </main>

    <footer class="main-footer">
        <p>Made by <span>Md Sajjad Hossain</span></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
